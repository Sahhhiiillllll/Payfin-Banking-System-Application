<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050810">
  <title>{% block title %}Payfin — Bank Smarter. Move Faster.{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Payfin Financial — India's next-generation digital banking platform with UPI payments, real-time transfers, and bank-grade security.{% endblock %}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2300d4c8'/><text y='.9em' font-size='70' x='14'>V</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div id="toast-container"></div>
  {% block body %}{% endblock %}
  <script src="/static/js/app.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
