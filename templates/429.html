{% extends "base.html" %}
{% block title %}Too Many Requests — Payfin{% endblock %}
{% block body %}
<div class="error-page">
  <div class="error-code">429</div>
  <div style="font-size:1.5rem;font-weight:700;margin-bottom:0.75rem;">Too Many Requests</div>
  <p style="color:var(--text-second);max-width:400px;margin:0 auto 2rem;line-height:1.7;">
    You've made too many requests in a short period. Please wait a moment before trying again.
  </p>
  <a href="/" class="btn btn-primary">Try Again</a>
</div>
{% endblock %}
